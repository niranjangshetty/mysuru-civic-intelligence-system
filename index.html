<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mysuru Civic Intelligence System</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid #e5e5e5;
      background: #fff;
    }
    header h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
      color: #1a1a1a;
    }
    header p {
      margin: 0.25rem 0 0;
      font-size: 0.875rem;
      color: #666;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .message {
      max-width: 85%;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.9375rem;
      line-height: 1.5;
    }
    .message.user {
      align-self: flex-end;
      background: #2563eb;
      color: #fff;
    }
    .message.assistant {
      align-self: flex-start;
      background: #f3f4f6;
      color: #1a1a1a;
    }
    .message.error {
      align-self: flex-start;
      background: #fef2f2;
      color: #991b1b;
    }
    #input-area {
      padding: 1rem 1.5rem;
      border-top: 1px solid #e5e5e5;
      background: #fff;
      display: flex;
      gap: 0.5rem;
    }
    #input {
      flex: 1;
      padding: 0.625rem 1rem;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 0.9375rem;
      font-family: inherit;
    }
    #input:focus {
      outline: none;
      border-color: #2563eb;
    }
    #send {
      padding: 0.625rem 1.25rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
    }
    #send:hover {
      background: #1d4ed8;
    }
    #send:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    #clear {
      padding: 0.625rem 1rem;
      background: #fff;
      color: #6b7280;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 0.875rem;
      cursor: pointer;
    }
    #clear:hover {
      background: #f9fafb;
    }
    @media (max-width: 640px) {
      .message {
        max-width: 95%;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Mysuru Civic Intelligence System</h1>
    <p>Grounded Civic Knowledge Assistant</p>
  </header>

  <div id="chat"></div>

  <div id="input-area">
    <input type="text" id="input" placeholder="Ask about Mysuru civic matters..." autocomplete="off">
    <button type="button" id="send">Send</button>
    <button type="button" id="clear">Clear</button>
  </div>

  <script>
    const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://127.0.0.1:8000/query'
      : 'http://16.171.243.244:8000/query';

    const chatEl = document.getElementById('chat');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const clearBtn = document.getElementById('clear');

    // Track conversation history
    let chatHistory = [];

    // Add user message bubble
    function addUserMessage(text) {
      const div = document.createElement('div');
      div.className = 'message user';
      div.textContent = text;
      chatEl.appendChild(div);
      scrollToBottom();
    }

    // Add assistant message (answer only, rendered as markdown)
    function addAssistantMessage(answer) {
      const div = document.createElement('div');
      div.className = 'message assistant';
      const answerEl = document.createElement('div');
      answerEl.innerHTML = marked.parse(answer || '');
      div.appendChild(answerEl);
      chatEl.appendChild(div);
      scrollToBottom();
    }

    // Add error message
    function addErrorMessage(text) {
      const div = document.createElement('div');
      div.className = 'message error';
      div.textContent = text;
      chatEl.appendChild(div);
      scrollToBottom();
    }

    // Add loading (thinking) bubble
    function addThinkingBubble() {
      const div = document.createElement('div');
      div.className = 'message assistant';
      div.id = 'thinking-bubble';
      div.textContent = 'Thinking...';
      chatEl.appendChild(div);
      scrollToBottom();
      return div;
    }

    // Remove thinking bubble
    function removeThinkingBubble() {
      const el = document.getElementById('thinking-bubble');
      if (el) el.remove();
    }

    function scrollToBottom() {
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    // Input validation
    function validateInput(text) {
      const trimmed = text.trim();
      if (!trimmed) return false;
      if (trimmed.length > 2000) return false;
      return true;
    }

    // Send message to API
    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!validateInput(text)) return;

      inputEl.value = '';
      sendBtn.disabled = true;

      addUserMessage(text);
      addThinkingBubble();

      // Add current question to history before sending
      chatHistory.push(text);

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            question: text,
            history: chatHistory.slice(-4, -1) // last 3 previous questions (not current)
          })
        });

        removeThinkingBubble();

        const data = await res.json().catch(function () {
          return { detail: 'Invalid response from server.' };
        });

        if (res.ok) {
          addAssistantMessage(data.answer || '');
        } else {
          if (res.status === 503) {
            addErrorMessage('Service unavailable. Please try again shortly.');
          } else {
            addErrorMessage(data.detail || 'An error occurred. Please try again.');
          }
        }
      } catch (err) {
        removeThinkingBubble();
        addErrorMessage('Unable to connect. Ensure the API is running at ' + API_URL);
      }

      sendBtn.disabled = false;
      inputEl.focus();
    }

    // Event listeners
    sendBtn.addEventListener('click', sendMessage);

    clearBtn.addEventListener('click', function () {
      chatEl.innerHTML = '';
      chatHistory = []; // reset history on clear
      inputEl.focus();
    });

    inputEl.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        sendMessage();
      }
    });

    inputEl.focus();
  </script>
</body>
</html>
